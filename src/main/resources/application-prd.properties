# =============================================================================
# CONFIGURAÇÕES DE PRODUÇÃO (Docker)
# =============================================================================

# Graceful shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Database — sobrescrito por SPRING_DATASOURCE_URL / PASSWORD no docker-compose
spring.datasource.url=jdbc:mysql://localhost:3306/sigaubs
spring.datasource.username=root
spring.datasource.password=root

# HikariCP
spring.datasource.hikari.minimumIdle=2

# Thymeleaf
spring.thymeleaf.cache=true

# Hibernate — batch com ordenação para agrupamento efetivo
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Spring logging (prd)
logging.level.org.springframework=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate=WARN

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%C{0}:%L] :: %msg%n%throwable

# Cache com Caffeine (dados estáticos: especialidades, UBS)
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=1h

# Observability
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.show-details=always
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles-histogram.http.client.requests=true
