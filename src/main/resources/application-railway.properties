# =============================================================================
# CONFIGURAÇÕES DO RAILWAY
# =============================================================================

# Cron — 5h UTC, equivale a meia-noite no fuso America/Sao_Paulo (UTC-5)
schedule.cron.contemplation=0 0 5 * * ?

# Graceful shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Database — variáveis de ambiente fornecidas automaticamente pelo Railway
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}

# HikariCP (Railway free tier — sem idle connections persistentes)
spring.datasource.hikari.minimumIdle=0

# Thymeleaf
spring.thymeleaf.cache=true

# Hibernate — batch com ordenação para agrupamento efetivo
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Spring logging (railway)
logging.level.org.springframework.security=INFO
logging.level.web=INFO
logging.level.org.hibernate=WARN

# Cache com Caffeine (dados estáticos: especialidades, UBS)
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=1h

# Observability (Railway — apenas health; sem Prometheus)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
