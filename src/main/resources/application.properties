spring.application.name=SIGAUBS
spring.profiles.active=dev

# Fuso horário
schedule.cron.contemplation.zone=America/Sao_Paulo
spring.jackson.time-zone=America/Sao_Paulo

# Cron padrão — meia-noite (sobrescrito por cada perfil quando necessário)
schedule.cron.contemplation=0 0 0 * * ?

# Sessão
server.servlet.session.cookie.same-site=lax

# Servidor
server.port=8080

# Virtual Threads Java 21+
spring.threads.virtual.enabled=true

# Compressão HTTP
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css

# Versionamento de recursos estáticos por conteúdo
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/js/**,/css/**

# Cache de recursos estáticos
spring.web.resources.cache.cachecontrol.max-age=30d

# Habilitar verbos HTTP via formulário HTML (PUT/DELETE)
spring.mvc.hiddenmethod.filter.enabled=true

# HikariCP — configurações compartilhadas
spring.datasource.hikari.maximum-pool-size=40
spring.datasource.hikari.maxLifetime=900000
spring.datasource.hikari.transaction-isolation=TRANSACTION_READ_COMMITTED
spring.datasource.hikari.auto-commit=false
spring.datasource.hikari.data-source-properties.useServerPrepStmts=false
spring.datasource.hikari.data-source-properties.cachePrepStmts=true
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=500
spring.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=1024

# Hibernate — configurações compartilhadas
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true
spring.jpa.properties.hibernate.query.in_clause_parameter_padding=true
spring.jpa.properties.hibernate.query.fail_on_pagination_over_collection_fetch=true
spring.jpa.properties.hibernate.query.plan_cache_max_size=4096

# IMPORTANTE!
# Não apagar esta configuração. Pode ocasionar problemas de performance e escalabilidade
# e pode ocasionar LazyInitializationException. Tratar cada uma separadamente.
spring.jpa.open-in-view=false

# Reverse proxy (Nginx / Railway) — lê x-forwarded-* para IP e protocolo reais
server.tomcat.remoteip.remote-ip-header=x-forwarded-for
server.tomcat.remoteip.protocol-header=x-forwarded-proto
